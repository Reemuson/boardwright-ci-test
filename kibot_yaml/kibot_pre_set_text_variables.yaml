# KiBot preflight for setting Text Variables
# https://kibot.readthedocs.io/en/latest/configuration/preflights/set_text_variables.html

kibot:
  version: 1

preflight:
  update_xml: true
  set_text_variables:

    # Git related information
    - variable: 'REVISION'
      command: 'git describe --tags --exact-match 2>/dev/null || git describe --tags --abbrev=0 2>/dev/null || echo ""'
    - variable: 'RELEASE_DATE'
      command: 'git log -1 --format="%ad" --date="format:%d-%b-%Y"'
    - variable: 'RELEASE_DATE_NUM'
      command: 'git log -1 --format="%ad" --date=short'
    - variable: 'GIT_HASH_SCH'
      command: 'git log -1 --format="%h" $KIBOT_SCH_NAME'
    - variable: 'GIT_HASH_PCB'
      command: 'git log -1 --format="%h" $KIBOT_PCB_NAME'
    - variable: 'GIT_URL'
      text: '@GIT_URL@'

    # Metadata
    - variable: 'PROJECT_NAME'
      text: '@PROJECT_NAME@'
    - variable: 'BOARD_NAME'
      text: '@BOARD_NAME@'
    - variable: 'COMPANY'
      text: '@COMPANY@'
    - variable: 'DESIGNER'
      text: '@DESIGNER@'
    - variable: 'VARIANT'
      text: '%V'

    # Revision history
    - variable: 'REVHIST_1_TITLE'
      command: '@GET_REVHIST_CMD@ REVHIST_1_TITLE'
    - variable: 'REVHIST_1_BODY'
      command: '@GET_REVHIST_CMD@ REVHIST_1_BODY'
    - variable: 'REVHIST_2_TITLE'
      command: '@GET_REVHIST_CMD@ REVHIST_2_TITLE'
    - variable: 'REVHIST_2_BODY'
      command: '@GET_REVHIST_CMD@ REVHIST_2_BODY'
    - variable: 'REVHIST_3_TITLE'
      command: '@GET_REVHIST_CMD@ REVHIST_3_TITLE'
    - variable: 'REVHIST_3_BODY'
      command: '@GET_REVHIST_CMD@ REVHIST_3_BODY'
    - variable: 'REVHIST_4_TITLE'
      command: '@GET_REVHIST_CMD@ REVHIST_4_TITLE'
    - variable: 'REVHIST_4_BODY'
      command: '@GET_REVHIST_CMD@ REVHIST_4_BODY'
    - variable: 'REVHIST_5_TITLE'
      command: '@GET_REVHIST_CMD@ REVHIST_5_TITLE'
    - variable: 'REVHIST_5_BODY'
      command: '@GET_REVHIST_CMD@ REVHIST_5_BODY'
    - variable: 'REVHIST_6_TITLE'
      command: '@GET_REVHIST_CMD@ REVHIST_6_TITLE'
    - variable: 'REVHIST_6_BODY'
      command: '@GET_REVHIST_CMD@ REVHIST_6_BODY'
    - variable: 'REVHIST_7_TITLE'
      command: '@GET_REVHIST_CMD@ REVHIST_7_TITLE'
    - variable: 'REVHIST_7_BODY'
      command: '@GET_REVHIST_CMD@ REVHIST_7_BODY'
    - variable: 'REVHIST_8_TITLE'
      command: '@GET_REVHIST_CMD@ REVHIST_8_TITLE'
    - variable: 'REVHIST_8_BODY'
      command: '@GET_REVHIST_CMD@ REVHIST_8_BODY'
    - variable: 'REVHIST_9_TITLE'
      command: '@GET_REVHIST_CMD@ REVHIST_9_TITLE'
    - variable: 'REVHIST_9_BODY'
      command: '@GET_REVHIST_CMD@ REVHIST_9_BODY'
    - variable: 'REVHIST_10_TITLE'
      command: '@GET_REVHIST_CMD@ REVHIST_10_TITLE'
    - variable: 'REVHIST_10_BODY'
      command: '@GET_REVHIST_CMD@ REVHIST_10_BODY'
    - variable: 'REVHIST_11_TITLE'
      command: '@GET_REVHIST_CMD@ REVHIST_11_TITLE'
    - variable: 'REVHIST_11_BODY'
      command: '@GET_REVHIST_CMD@ REVHIST_11_BODY'
    - variable: 'REVHIST_12_TITLE'
      command: '@GET_REVHIST_CMD@ REVHIST_12_TITLE'
    - variable: 'REVHIST_12_BODY'
      command: '@GET_REVHIST_CMD@ REVHIST_12_BODY'

    # Fabrication notes
    - variable: 'FABRICATION_NOTES'
      expand_in_command: true
      command: '[ -f "@FABRICATION_DIR@/%f-fabrication_notes%v.txt" ] && cat "@FABRICATION_DIR@/%f-fabrication_notes%v.txt" || echo ""'


    # Fabrication notes
    - variable: 'ASSEMBLY_NOTES'
      expand_in_command: true
      command: '[ -f "@ASSEMBLY_DIR@/%f-assembly_notes%v.txt" ] && cat "@ASSEMBLY_DIR@/%f-assembly_notes%v.txt" || echo ""'

    # Page titles for automatic ToC
    - variable: '@SHEET_NAME_VAR@1'
      text: 'COVER PAGE'

  GIT_URL: ""
  SHEET_NAME_VAR: SHEET_NAME_
  SCRIPTS_DIR: kibot_resources/scripts
  GET_SHEET_CMD: python3 @SCRIPTS_DIR@/get_sheet_title.py -f "${KIBOT_SCH_NAME}" --dots-number 32 -p

name: Boardwright Release

on:
  push:
    tags:
      - '[0-9]+.[0-9]+.[0-9]+'
  workflow_dispatch:

permissions:
  contents: write
  actions: read

env:
  KIBOT_CONFIG: kibot_yaml/kibot_main.yaml
  KIBOT_LOG: kibot_release.log
  KICAD_VERSION: "9"
  RELEASE_DIR: boardwright-release
  RELEASE_KIND: release
  RELEASE_VARIANT: RELEASED

jobs:
  release:
    runs-on: ubuntu-latest
    if: github.ref_type == 'tag'
    steps:
      - name: Checkout tag
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}
          fetch-depth: 0

      - name: Ensure 3D cache directory
        run: mkdir -p ~/cache_3d

      - name: Cache 3D models
        uses: set-soft/cache@main
        with:
          path: ~/cache_3d
          key: cache-3d-kicad-${{ env.KICAD_VERSION }}

      - name: Load release metadata
        shell: bash
        run: |
          if [[ -f .boardwright/release.env ]]; then
            sed -n 's/^\(RELEASE_KIND\|RELEASE_VARIANT\)=/export \1=/p' .boardwright/release.env > release_metadata.sh
            source release_metadata.sh
            echo "RELEASE_KIND=${RELEASE_KIND:-release}" >> "$GITHUB_ENV"
            echo "RELEASE_VARIANT=${RELEASE_VARIANT:-RELEASED}" >> "$GITHUB_ENV"
          fi

      - name: Select KiBot generation mode
        shell: bash
        run: |
          variant="${RELEASE_VARIANT:-RELEASED}"

          case "$variant" in
            DRAFT)
              additional_args="--skip-pre erc,drc --log $KIBOT_LOG draft_group md_readme"
              ;;
            PRELIMINARY)
              additional_args="--skip-pre erc,drc --log $KIBOT_LOG all_group_k9"
              ;;
            CHECKED|RELEASED)
              additional_args="--log $KIBOT_LOG all_group_k9"
              ;;
            *)
              echo "Unsupported release variant: $variant" >&2
              exit 1
              ;;
          esac

          echo "KIBOT_VARIANT=$variant" >> "$GITHUB_ENV"
          echo "KIBOT_ADDITIONAL_ARGS=$additional_args" >> "$GITHUB_ENV"

      - name: Generate release notes
        uses: INTI-CMNB/KiBot@v2_dk9
        with:
          skip: all
          variant: ${{ env.KIBOT_VARIANT }}
          config: ${{ env.KIBOT_CONFIG }}
          additional_args: --log kibot_release_notes.log notes

      - name: Generate release outputs
        uses: INTI-CMNB/KiBot@v2_dk9
        with:
          additional_args: ${{ env.KIBOT_ADDITIONAL_ARGS }}
          variant: ${{ env.KIBOT_VARIANT }}
          config: ${{ env.KIBOT_CONFIG }}
          cache3D: YES

      - name: Check generated README
        shell: bash
        run: |
          if [[ ! -s README.md ]]; then
            echo "README.md was not generated by KiBot." >&2
            exit 1
          fi

      - name: Generate GitHub release markdown
        shell: bash
        run: |
          tag="${GITHUB_REF_NAME}"
          repo="${GITHUB_REPOSITORY}"
          release_url="https://github.com/${repo}/releases/download/${tag}"

          top_image=""
          bottom_image=""
          if [[ -d Images ]]; then
            top_image="$(find Images -maxdepth 1 -type f \( -iname '*angled_top*.png' -o -iname '*top*.png' \) | sort | head -n 1 || true)"
            bottom_image="$(find Images -maxdepth 1 -type f \( -iname '*angled_bottom*.png' -o -iname '*bottom*.png' \) | sort | head -n 1 || true)"
          fi

          {
            echo "# ${tag}"
            echo
            echo "Generated \`${RELEASE_VARIANT}\` package for \`${repo}\`."
            echo
            if [[ -n "$top_image" || -n "$bottom_image" ]]; then
              echo "## Board Images"
              echo
              echo '<p align="center">'
              if [[ -n "$top_image" ]]; then
                echo "  <img alt=\"Top board render\" src=\"${release_url}/$(basename "$top_image")\" width=\"45%\">"
              fi
              if [[ -n "$bottom_image" ]]; then
                if [[ -n "$top_image" ]]; then
                  echo '&nbsp; &nbsp; &nbsp; &nbsp;'
                fi
                echo "  <img alt=\"Bottom board render\" src=\"${release_url}/$(basename "$bottom_image")\" width=\"45%\">"
              fi
              echo '</p>'
              echo
            fi
            echo "## Changes"
            echo
            awk -v tag="$tag" '
              $0 == "## [" tag "]" || $0 ~ "^## \\[" tag "\\] - " { capture=1; next }
              capture && /^## \[/ { exit }
              capture { print }
            ' CHANGELOG.md
            echo
            echo "## Assets"
            echo
            echo "- Full release package: \`boardwright-${tag}-release.zip\`"
            echo "- Generated README: included in the release package and generated from \`kibot_resources/templates/readme.txt\`"
          } > RELEASE_NOTES.md

          if [[ -n "$top_image" ]]; then
            cp "$top_image" "$(basename "$top_image")"
          fi
          if [[ -n "$bottom_image" ]]; then
            cp "$bottom_image" "$(basename "$bottom_image")"
          fi

      - name: Collect release assets
        shell: bash
        run: |
          rm -rf "$RELEASE_DIR"
          mkdir -p "$RELEASE_DIR"

          for path in Schematic Manufacturing Images HTML KiRI 3D Testing Reports README.md NOTICE.md THIRD_PARTY_NOTICES.md LICENSE; do
            if [[ -e "$path" ]]; then
              cp -a "$path" "$RELEASE_DIR/"
            fi
          done

          find "$RELEASE_DIR" -type f -print | sort > "$RELEASE_DIR/MANIFEST.txt"
          zip -r "boardwright-${{ github.ref_name }}-release.zip" "$RELEASE_DIR"

      - name: Upload release package artifact
        uses: actions/upload-artifact@v4
        with:
          name: boardwright-release-${{ github.ref_name }}
          path: boardwright-${{ github.ref_name }}-release.zip

      - name: Upload KiBot logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: boardwright-release-logs
          path: |
            kibot_release*.log

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: RELEASE_NOTES.md
          files: |
            boardwright-${{ github.ref_name }}-release.zip
            README.md
            *.png
          draft: ${{ env.RELEASE_KIND == 'draft' }}
          prerelease: ${{ env.RELEASE_KIND == 'prerelease' }}
          generate_release_notes: false

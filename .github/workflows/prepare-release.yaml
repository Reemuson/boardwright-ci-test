name: Boardwright Prepare Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: Semantic version to release
        required: true
        type: string
      variant:
        description: KiBot variant to accept and tag
        required: true
        default: CHECKED
        type: choice
        options:
          - DRAFT
          - PRELIMINARY
          - CHECKED
          - RELEASED
      release_kind:
        description: GitHub Release state for the tag workflow
        required: true
        default: prerelease
        type: choice
        options:
          - draft
          - prerelease
          - release

permissions:
  contents: write
  actions: write

env:
  KIBOT_CONFIG: kibot_yaml/kibot_main.yaml
  KIBOT_LOG: kibot_prepare_release.log
  KICAD_VERSION: "9"

jobs:
  prepare:
    runs-on: ubuntu-latest
    if: github.ref_type == 'branch' && github.ref_name == 'main'
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Configure git author
        shell: bash
        run: |
          git config user.name "boardwright[bot]"
          git config user.email "boardwright[bot]@users.noreply.github.com"

      - name: Install Boardwright
        shell: bash
        run: python -m pip install -e .

      - name: Prepare changelog and release metadata
        shell: bash
        run: |
          version="${{ inputs.version }}"
          variant="${{ inputs.variant }}"
          release_kind="${{ inputs.release_kind }}"

          boardwright release "$version" --prepare --allow-dirty

          cat > .boardwright/release.env <<EOF
          RELEASE_VERSION=$version
          RELEASE_VARIANT=$variant
          RELEASE_KIND=$release_kind
          EOF

      - name: Select KiBot generation mode
        shell: bash
        run: |
          variant="${{ inputs.variant }}"

          case "$variant" in
            DRAFT)
              additional_args="--skip-pre erc,drc --log $KIBOT_LOG draft_group md_readme"
              ;;
            PRELIMINARY)
              additional_args="--skip-pre erc,drc --log $KIBOT_LOG all_group_k9"
              ;;
            CHECKED|RELEASED)
              additional_args="--log $KIBOT_LOG all_group_k9"
              ;;
            *)
              echo "Unsupported release variant: $variant" >&2
              exit 1
              ;;
          esac

          echo "KIBOT_VARIANT=$variant" >> "$GITHUB_ENV"
          echo "KIBOT_ADDITIONAL_ARGS=$additional_args" >> "$GITHUB_ENV"

      - name: Ensure 3D cache directory
        run: mkdir -p ~/cache_3d

      - name: Cache 3D models
        uses: set-soft/cache@main
        with:
          path: ~/cache_3d
          key: cache-3d-kicad-${{ env.KICAD_VERSION }}

      - name: Generate notes
        uses: INTI-CMNB/KiBot@v2_dk9
        with:
          skip: all
          variant: ${{ env.KIBOT_VARIANT }}
          config: ${{ env.KIBOT_CONFIG }}
          additional_args: --log kibot_prepare_notes.log notes

      - name: Generate accepted outputs
        uses: INTI-CMNB/KiBot@v2_dk9
        with:
          additional_args: ${{ env.KIBOT_ADDITIONAL_ARGS }}
          variant: ${{ env.KIBOT_VARIANT }}
          config: ${{ env.KIBOT_CONFIG }}
          cache3D: YES

      - name: Check generated README
        shell: bash
        run: |
          if [[ ! -s README.md ]]; then
            echo "README.md was not generated by KiBot." >&2
            exit 1
          fi

      - name: Discard KiCad source side effects
        shell: bash
        run: |
          git checkout HEAD -- '*.kicad_pcb' '*.kicad_pro' '*.kicad_dru' '*.kicad_prl' '*.kicad_sch' || true
          git clean -f '*.kicad_pcb' '*.kicad_pro' '*.kicad_dru' '*.kicad_prl' '*.kicad_sch' || true

      - name: Commit accepted release state
        shell: bash
        run: |
          version="${{ inputs.version }}"
          variant="${{ inputs.variant }}"

          git rm -r --ignore-unmatch 3D HTML KiRI Manufacturing Reports Schematic Testing
          git add CHANGELOG.md .boardwright/revision_history_variables.env .boardwright/release.env
          git add README.md Images/*.png || true

          if git diff --cached --quiet; then
            echo "No release changes to commit." >&2
            exit 1
          fi

          git commit -m "release: prepare ${version} (${variant})"
          git push origin HEAD:main

      - name: Create and push tag
        shell: bash
        run: |
          version="${{ inputs.version }}"

          if git rev-parse --verify --quiet "refs/tags/$version"; then
            echo "Local tag already exists: $version" >&2
            exit 1
          fi
          if git ls-remote --exit-code --tags origin "refs/tags/$version" >/dev/null 2>&1; then
            echo "Remote tag already exists: $version" >&2
            exit 1
          fi

          git tag "$version"
          git push origin "$version"

      - name: Dispatch tag release workflow
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          version="${{ inputs.version }}"
          gh workflow run release.yaml --ref "$version" --repo "$GITHUB_REPOSITORY"

      - name: Upload prepare logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: boardwright-prepare-release-logs
          path: |
            kibot_prepare*.log

name: Boardwright Dev Preview

on:
  push:
    branches:
      - dev
  workflow_dispatch:
    inputs:
      variant:
        description: KiBot variant to generate
        required: false
        default: DRAFT
        type: choice
        options:
          - DRAFT
          - PRELIMINARY
          - CHECKED

permissions:
  contents: write
  actions: read

env:
  KIBOT_CONFIG: kibot_yaml/kibot_main.yaml
  KIBOT_LOG: kibot_preview.log
  KICAD_VERSION: "9"
  PREVIEW_DIR: boardwright-preview

jobs:
  preview:
    runs-on: ubuntu-latest
    if: github.ref_type == 'branch'
    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Select variant and group
        shell: bash
        run: |
          variant="${{ github.event.inputs.variant }}"
          if [[ -z "$variant" ]]; then
            variant="DRAFT"
          fi

          case "$variant" in
            DRAFT)
              additional_args="--skip-pre draw_fancy_stackup,erc,drc --log $KIBOT_LOG draft_group"
              ;;
            PRELIMINARY)
              additional_args="--skip-pre erc,drc --log $KIBOT_LOG all_group_k9"
              ;;
            CHECKED)
              additional_args="--log $KIBOT_LOG all_group_k9"
              ;;
            *)
              echo "Unsupported variant: $variant" >&2
              exit 1
              ;;
          esac

          echo "KIBOT_VARIANT=$variant" >> "$GITHUB_ENV"
          echo "KIBOT_ADDITIONAL_ARGS=$additional_args" >> "$GITHUB_ENV"

      - name: Ensure 3D cache directory
        run: mkdir -p ~/cache_3d

      - name: Cache 3D models
        uses: set-soft/cache@main
        with:
          path: ~/cache_3d
          key: cache-3d-kicad-${{ env.KICAD_VERSION }}

      - name: Generate notes
        if: env.KIBOT_VARIANT != 'DRAFT'
        uses: INTI-CMNB/KiBot@v2_dk9
        with:
          skip: all
          variant: ${{ env.KIBOT_VARIANT }}
          config: ${{ env.KIBOT_CONFIG }}
          additional_args: --log kibot_preview_notes.log notes

      - name: Generate README
        if: env.KIBOT_VARIANT == 'DRAFT'
        uses: INTI-CMNB/KiBot@v2_dk9
        with:
          skip: draw_fancy_stackup,set_text_variables,erc,drc
          variant: ${{ env.KIBOT_VARIANT }}
          config: ${{ env.KIBOT_CONFIG }}
          additional_args: --log kibot_preview_readme.log md_readme

      - name: Generate preview outputs
        uses: INTI-CMNB/KiBot@v2_dk9
        with:
          additional_args: ${{ env.KIBOT_ADDITIONAL_ARGS }}
          variant: ${{ env.KIBOT_VARIANT }}
          config: ${{ env.KIBOT_CONFIG }}
          cache3D: YES

      - name: Collect preview outputs
        shell: bash
        run: |
          rm -rf "$PREVIEW_DIR"
          mkdir -p "$PREVIEW_DIR"

          for path in Schematic Manufacturing Images HTML KiRI 3D Testing Reports README.md; do
            if [[ -e "$path" ]]; then
              cp -a "$path" "$PREVIEW_DIR/"
            fi
          done

          cat > "$PREVIEW_DIR/README.md" <<EOF
          # Boardwright Preview Outputs

          Generated from \`${{ github.sha }}\` on branch \`${{ github.ref_name }}\`.

          Variant: \`${{ env.KIBOT_VARIANT }}\`

          This branch is disposable and generated by GitHub Actions. Do not edit
          files here by hand.
          EOF

      - name: Upload preview artifact
        uses: actions/upload-artifact@v4
        with:
          name: boardwright-preview-${{ env.KIBOT_VARIANT }}
          path: ${{ env.PREVIEW_DIR }}

      - name: Upload KiBot logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: boardwright-preview-logs
          path: |
            kibot_preview*.log

      - name: Publish preview branch
        if: github.ref_name == 'dev'
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: preview
          folder: ${{ env.PREVIEW_DIR }}
          clean: true
          single-commit: true
          commit-message: "chore(outputs): update preview outputs"
